<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>你适合在魔幻世界选择什么职业？</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --paper: #fbfaf7;
      --panel: #ffffff;
      --accent: #b23a48;
      --accent-2: #0f766e;
      --gold: #b7791f;
      --shadow: 0 20px 55px rgba(31, 41, 51, 0.12);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(178, 58, 72, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(15, 118, 110, 0.09), transparent 36%),
        var(--paper);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1080px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      align-items: center;
    }

    .shell {
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(217, 222, 231, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    header {
      display: grid;
      gap: 14px;
      padding: 20px clamp(18px, 4vw, 36px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .topline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #eceff3;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent-2));
      transition: width 240ms ease;
    }

    main {
      padding: clamp(18px, 4vw, 38px);
    }

    .question-pane {
      display: grid;
      gap: clamp(18px, 3vw, 28px);
    }

    .question-text {
      font-size: clamp(19px, 3vw, 28px);
      line-height: 1.45;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .choice {
      min-height: 138px;
      display: grid;
      align-content: start;
      gap: 8px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .choice strong {
      color: var(--accent);
      font-size: 14px;
    }

    .choice p {
      color: #354052;
      font-size: clamp(15px, 2vw, 17px);
      line-height: 1.65;
    }

    .scale {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale button,
    .nav button,
    .result-actions button {
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .scale button {
      padding: 10px 8px;
      line-height: 1.25;
      font-size: 14px;
    }

    .scale button:hover,
    .nav button:hover,
    .result-actions button:hover {
      transform: translateY(-1px);
      border-color: #aeb7c4;
    }

    .scale button.selected {
      border-color: var(--accent);
      background: #fff3f4;
      color: #862633;
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 4px;
    }

    .nav button,
    .result-actions button {
      padding: 0 16px;
      font-weight: 650;
    }

    .nav .primary,
    .result-actions .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .hidden {
      display: none;
    }

    .results {
      display: grid;
      gap: 24px;
    }

    .result-title {
      display: grid;
      gap: 8px;
    }

    .result-title h2 {
      font-size: clamp(25px, 5vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .career {
      color: #2f3a48;
      font-size: clamp(17px, 2vw, 20px);
      line-height: 1.55;
      text-align: left;
    }

    .career strong {
      color: var(--accent);
      font-size: 1.18em;
    }

    .result-image {
      display: block;
      width: min(180px, 48vw);
      max-height: 215px;
      object-fit: contain;
      margin: 4px auto 0;
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(31, 41, 51, 0.16);
    }

    .bars {
      display: grid;
      gap: 18px;
    }

    .bar-card {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: #354052;
      font-size: 14px;
      line-height: 1.4;
    }

    .bar-head strong {
      color: var(--ink);
    }

    .bar {
      position: relative;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #b23a48, #eef1f4 50%, #0f766e);
      border: 1px solid #cdd5df;
    }

    .bar::after {
      content: "";
      position: absolute;
      top: -7px;
      left: var(--pos);
      width: 6px;
      height: 28px;
      border-radius: 999px;
      background: #1f2933;
      transform: translateX(-50%);
      box-shadow: 0 4px 10px rgba(31, 41, 51, 0.22);
    }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .result-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    @media (max-width: 760px) {
      .app {
        padding: 10px;
        align-items: stretch;
      }

      .shell {
        min-height: calc(100vh - 20px);
      }

      .topline,
      .bar-head,
      .result-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .scale {
        grid-template-columns: 1fr;
      }

      .scale button {
        min-height: 42px;
      }

      .choice {
        min-height: auto;
      }

      .nav {
        position: sticky;
        bottom: 0;
        margin: 0 calc(clamp(18px, 4vw, 38px) * -1) calc(clamp(18px, 4vw, 38px) * -1);
        padding: 12px clamp(18px, 4vw, 38px);
        background: rgba(255, 255, 255, 0.94);
        border-top: 1px solid var(--line);
      }

      .nav button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="shell" aria-live="polite">
      <header>
        <div class="topline">
          <h1>你适合在魔幻世界选择什么职业？</h1>
          <div class="meta" id="counter">第 1 / 40 题</div>
        </div>
        <div class="progress-track" aria-label="答题进度">
          <div class="progress-fill" id="progress"></div>
        </div>
      </header>

      <main>
        <section class="question-pane" id="quiz">
          <p class="question-text" id="question"></p>
          <div class="choices">
            <article class="choice">
              <strong>A</strong>
              <p id="choiceA"></p>
            </article>
            <article class="choice">
              <strong>B</strong>
              <p id="choiceB"></p>
            </article>
          </div>
          <div class="scale" id="scale"></div>
          <div class="nav">
            <button type="button" id="prev">← 上一题</button>
            <button type="button" id="next" class="primary">下一题 →</button>
          </div>
        </section>

        <section class="results hidden" id="results">
          <div class="result-title">
            <h2 id="resultTitle"></h2>
            <img class="result-image" id="resultImage" alt="" onerror="this.hidden = true">
          </div>
          <div class="bars" id="bars"></div>
          <p class="career" id="career"></p>
          <div class="result-actions">
            <button type="button" id="edit">返回修改</button>
            <button type="button" class="primary" id="restart">重新作答</button>
          </div>
        </section>
      </main>
    </section>
  </div>

      q("在攻城战中，士兵在附近发现了一个大缸，可以往里面灌东西然后用投石机扔到敌人城中。军需官翻遍营地发现了一瓶麻痹药和一瓶卓尔毒素，很不幸混合它们会导致失效。", "发射麻痹药，让敌人持续眩晕，动作迟缓，方便进攻。", "发射毒素，削弱敌人血量，加快收割。", "tactic", "right"),
      q("你需要向城市中的乞丐打听一些消息，有时候乞丐掌握的要人行踪比间谍还准确。乞丐的胃口并不大，往往给点小钱就能换到情报。不过，威胁恐吓也无所谓，乞丐害怕拳头胜过挨饿，最重要的是没人在乎一个乞丐的消失。", "在一个四下无人的角落，拎起乞丐威胁给一拳就行了，没人会在意，简单方便。", "给点零钱就行了，还能换一个善人的名声，何乐而不为。", "society", "right"),
      q("你为领主救回了他的女儿，除了钱和装备，领主准备派人给你画一幅肖像画作为额外答谢。画师向你征询画的风格。", "你站在城墙顶端举起长剑，威风，充满力量，面朝远方，披风在身后招展。", "你漂浮在蓝色梦幻般的空间中，身边被华丽的炫光包围，看起来神秘且充满智慧。", "power", "left"),
      q("你与对手的实力太过接近，你们交手了一整天也没能分出胜负，最后一刀对砍把你们两个都震飞了出去，地面上出现了一个巨大的裂缝悬崖。你们两个都已经筋疲力尽，在悬崖处面面相觑。但是你还有最后一个传送卷轴。", "传送到他面前，今天必须抓住机会处理掉筋疲力尽的他，否则日后他变强更难办。", "传送远离，等我恢复状态，找到强力援助，成长一段时间再凭借优势解决他。", "tactic", "left"),
      q("一个狡猾贵族出于政治目的处处针对你的派系，终于有一天他自己的勾当败露，考虑到他自己的护卫非常多，而且非常忠诚，市议会决定派遣卫队逮捕他。你的搭档是一位年轻贵族，虽然能力不行，他负责的事情搞不好会出纰漏，但是他愿意支持你的一切行动。", "让搭档带领卫队包围狡猾贵族的住宅，封锁路口，吸引护卫的注意，你亲自带领小队潜入贵族藏身处逮捕他。", "让搭档带领特遣队潜入贵族藏身处，你自己负责包围圈，保证什么都跑不出去。最后收紧兵力，直到逮捕成功。", "front", "right"),
      q("你在山林中跋涉的时候发现了一个奇形怪状的生物，你从来没见过，也判断不出强弱。不巧的是它也发现了你，展开獠牙朝你直接扑过来。", "先跑，鬼知道这东西有多厉害，先跑到安全的地方再弄清楚这是什么。", "先防御还手，要是跑不过它还把背面暴露给它，搞不好真要出大事。", "front", "right"),
      q("恶魔领主的进攻被挫败了，领主本人被放逐回了地狱，留下一大群次级恶魔畏畏缩缩，已经彻底失去士气。", "让队伍里的牧师释放威吓性质的圣光，能驱散就驱散，如果他们负隅顽抗再组织进攻。", "格杀勿论，不需要怜悯恶魔，更何况现在他们一触即溃。", "tactic", "right"),
      q("在你功成身就之后，一群小孩围住你问道：“你是怎么成为传奇的？”", "我的毅力与坚持驱使我一步一步成长，在我回头的时候才发现我已经足够强大。", "我的智力是我的天赋，我的信仰是我的幸运，感谢命运使我变得足够强大。", "power", "left"),
      q("在冒险的终点，你手握能够对人内心产生潜移默化影响的神器。这时候你想到了伟大的理想。", "让民众感受希望和信心，而你将带领他们建立一个伟大的国家，或者至少，带领身边的人得到幸福的生活。", "逐渐影响值得影响的人，最终无论是财富、权柄、知识还是法力都在你的操纵中，而到那时想要做什么，只有想象力能限制你。", "society", "left")
    ];

    const scale = [
      { label: "特别同意 A", value: -2 },
      { label: "比较倾向 A", value: -1 },
      { label: "中立", value: 0 },
      { label: "比较倾向 B", value: 1 },
      { label: "特别同意 B", value: 2 }
    ];

    const answers = Array(questions.length).fill(null);
    let current = 0;

    const el = {
      counter: document.querySelector("#counter"),
      progress: document.querySelector("#progress"),
      quiz: document.querySelector("#quiz"),
      results: document.querySelector("#results"),
      question: document.querySelector("#question"),
      choiceA: document.querySelector("#choiceA"),
      choiceB: document.querySelector("#choiceB"),
      scale: document.querySelector("#scale"),
      prev: document.querySelector("#prev"),
      next: document.querySelector("#next"),
      resultTitle: document.querySelector("#resultTitle"),
      resultImage: document.querySelector("#resultImage"),
      career: document.querySelector("#career"),
      bars: document.querySelector("#bars"),
      edit: document.querySelector("#edit"),
      restart: document.querySelector("#restart")
    };

    function q(text, a, b, dimension, aSide) {
      return { text, a, b, dimension, aSide };
    }

    function dimensionFor(key) {
      return dimensions.find((item) => item.key === key);
    }

    function renderScale() {
      el.scale.innerHTML = "";
      scale.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = item.label;
        button.className = answers[current] === item.value ? "selected" : "";
        button.addEventListener("click", () => {
          answers[current] = item.value;
          if (current < questions.length - 1) {
            current += 1;
            renderQuestion();
          } else {
            showResults();
          }
        });
        el.scale.appendChild(button);
      });
    }

    function renderQuestion() {
      const item = questions[current];
      const answered = answers.filter((answer) => answer !== null).length;
      el.counter.textContent = `第 ${current + 1} / ${questions.length} 题`;
      el.progress.style.width = `${(answered / questions.length) * 100}%`;
      el.question.textContent = item.text;
      el.choiceA.textContent = item.a;
      el.choiceB.textContent = item.b;
      el.prev.disabled = current === 0;
      el.next.disabled = answers[current] === null;
      el.next.textContent = current === questions.length - 1 ? "提交结果 →" : "下一题 →";
      renderScale();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function scoreAnswers() {
      const result = Object.fromEntries(dimensions.map((dimension) => [
        dimension.key,
        { score: 0, max: 0, bit: "0", position: 50, leaning: "中线" }
      ]));

      questions.forEach((question, index) => {
        const answer = answers[index] ?? 0;
        const direction = question.aSide === "left" ? answer : -answer;
        result[question.dimension].score += direction;
        result[question.dimension].max += 2;
      });

      dimensions.forEach((dimension) => {
        const item = result[dimension.key];
        const ratio = item.max ? item.score / item.max : 0;
        item.position = Math.max(0, Math.min(100, 50 + ratio * 50));
        item.displayScore = Math.round(item.position);
        item.bit = item.score > 0 ? "1" : "0";
        item.leaning = item.score === 0 ? "中线" : item.score > 0 ? dimension.right : dimension.left;
      });

      return result;
    }

    function showResults() {
      if (answers.some((answer) => answer === null)) return;
      const scores = scoreAnswers();
      const code = dimensions.map((dimension) => scores[dimension.key].bit).join("");
      const career = careers[code];
      const asset = careerAssets[code];

      el.quiz.classList.add("hidden");
      el.results.classList.remove("hidden");
      el.counter.textContent = "结果";
      el.progress.style.width = "100%";
      el.resultTitle.innerHTML = `你更适合选择 <strong>${career.name}</strong> 职业`;
      el.resultImage.hidden = false;
      el.resultImage.src = asset.image;
      el.resultImage.alt = career.name;
      el.career.textContent = asset.description;
      el.bars.innerHTML = "";

      dimensions.forEach((dimension) => {
        const item = scores[dimension.key];
        const card = document.createElement("article");
        card.className = "bar-card";
        card.innerHTML = `
          <div class="bar-head">
            <strong>${dimension.name}</strong>
            <span>${item.leaning}${item.score === 0 ? "，编码暂按左侧归类" : ""} · 分数 ${item.displayScore}</span>
          </div>
          <div class="bar" style="--pos:${item.position}%"></div>
          <div class="bar-labels">
            <span>${dimension.left}</span>
            <span>${dimension.right}</span>
          </div>
        `;
        el.bars.appendChild(card);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    el.prev.addEventListener("click", () => {
      if (current > 0) {
        current -= 1;
        renderQuestion();
      }
    });

    el.next.addEventListener("click", () => {
      if (answers[current] === null) return;
      if (current < questions.length - 1) {
        current += 1;
        renderQuestion();
      } else {
        showResults();
      }
    });

    el.edit.addEventListener("click", () => {
      el.results.classList.add("hidden");
      el.quiz.classList.remove("hidden");
      current = questions.length - 1;
      renderQuestion();
    });

    el.restart.addEventListener("click", () => {
      answers.fill(null);
      current = 0;
      el.results.classList.add("hidden");
      el.quiz.classList.remove("hidden");
      renderQuestion();
    });

    renderQuestion();
  </script>
</body>
</html>
